<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyphone - VoIP</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --text-color: #e6f1ff;
            --accent-blue: #64ffda;
            --danger: #ff4d4d;
            --success: #4caf50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { color: var(--accent-blue); margin-bottom: 0.5rem; }
        h2 { font-size: 1.2rem; margin-top: 2rem; border-bottom: 1px solid #233554; padding-bottom: 5px; }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            background: #233554;
            color: white;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin: 5px;
        }

        .btn-primary { background: var(--accent-blue); color: var(--bg-color); }
        .btn-google { background: #db4437; color: white; }
        .btn-call { background: var(--success); color: white; border-radius: 50%; width: 45px; height: 45px; }
        .btn-hangup { background: var(--danger); color: white; border-radius: 50%; width: 60px; height: 60px; font-size: 20px; }
        .btn-reject { background: var(--danger); color: white; border-radius: 50%; width: 45px; height: 45px; }

        .hidden { display: none !important; }

        .call-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1d2d50;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
        }

        #callScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(100, 255, 218, 0.4); }
            100% { box-shadow: 0 0 0 20px rgba(100, 255, 218, 0); }
        }
    </style>
</head>
<body>

    <div id="loginScreen" class="container">
        <h1>Skyphone</h1>
        <p>Willkommen zurück</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Passwort">
        <button class="btn-primary" onclick="login()">Anmelden</button>
        <button class="btn-primary" onclick="register()">Registrieren</button>
        <hr style="border: 0.5px solid #233554; margin: 20px 0;">
        <button class="btn-google" onclick="googleLogin()">Mit Google anmelden</button>
    </div>

    <div id="mainScreen" class="container hidden">
        <h1>Skyphone</h1>
        <p id="userEmailDisplay" style="font-size: 0.8rem; opacity: 0.7;"></p>
        
        <h2>Aktuelle Anrufe</h2>
        <div id="incomingCallsList">
            </div>

        <h2>Jemanden anrufen</h2>
        <input type="email" id="targetEmail" placeholder="E-Mail des Partners">
        <button class="btn-call" onclick="startCall()">📞</button>
        
        <button style="margin-top: 30px; background: transparent; color: gray;" onclick="logout()">Abmelden</button>
    </div>

    <div id="callScreen" class="hidden">
        <h2 id="callStatus">Verbunden mit...</h2>
        <div id="remoteUserEmail" style="font-size: 1.5rem; margin-bottom: 50px;">email@test.de</div>
        <div class="pulse" style="width: 100px; height: 100px; background: #233554; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 50px;">
            <span style="font-size: 40px;">👤</span>
        </div>
        <button class="btn-hangup" onclick="endCall()">📞</button>
        <audio id="remoteAudio" autoplay></audio>
        <audio id="localAudio" autoplay muted></audio>
    </div>

    <script>
        // FIREBASE KONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyCFqqgdh4JuPSQW09mDMAUktpeNW8jbGB4", authDomain: "skyphone-ad634.firebaseapp.com", projectId: "skyphone-ad634", storageBucket: "skyphone-ad634.firebasestorage.app", messagingSenderId: "393614313303", appId: "1:393614313303:web:8c7cccc3a5036d24752012"         };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let localStream;
        let remoteStream;
        let peerConnection;
        let currentCallDocId = null;

        const servers = {
            iceServers: [
                { urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }
            ],
            iceCandidatePoolSize: 10,
        };

        // --- AUTHENTIFIZIERUNG ---

        auth.onAuthStateChanged(user => {
            if (user) {
                showScreen('mainScreen');
                document.getElementById('userEmailDisplay').innerText = user.email;
                registerOnlineStatus(user);
                listenForCalls(user.email);
            } else {
                showScreen('loginScreen');
            }
        });

        async function register() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try {
                await auth.createUserWithEmailAndPassword(e, p);
                await db.collection('users').doc(e).set({ registered: true });
            } catch (err) { alert(err.message); }
        }

        async function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch (err) { alert(err.message); }
        }

        async function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                await db.collection('users').doc(result.user.email).set({ registered: true });
            } catch (err) { alert(err.message); }
        }

        function logout() { auth.signOut(); location.reload(); }

        function registerOnlineStatus(user) {
            db.collection('users').doc(user.email).update({ online: true, lastSeen: Date.now() });
        }

        // --- TELEFONIE LOGIK (WebRTC) ---

        async function setupMedia() {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            document.getElementById('localAudio').srcObject = localStream;
        }

        // Anruf starten
        async function startCall() {
            const targetEmail = document.getElementById('targetEmail').value;
            if (!targetEmail) return;

            const userCheck = await db.collection('users').doc(targetEmail).get();
            if (!userCheck.exists) {
                alert("Diese Email ist bei Skyphone nicht registriert.");
                return;
            }

            await setupMedia();
            showScreen('callScreen');
            document.getElementById('remoteUserEmail').innerText = targetEmail;
            document.getElementById('callStatus').innerText = "Rufe an...";

            const callDoc = db.collection('calls').doc();
            currentCallDocId = callDoc.id;

            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = event => {
                event.candidate && callDoc.collection('callerCandidates').add(event.candidate.toJSON());
            };

            const offerDescription = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offerDescription);

            const offer = {
                sdp: offerDescription.sdp,
                type: offerDescription.type,
                from: auth.currentUser.email,
                to: targetEmail,
                status: 'ringing'
            };

            await callDoc.set(offer);

            // Auf Antwort warten
            callDoc.onSnapshot(snapshot => {
                const data = snapshot.data();
                if (!peerConnection.currentRemoteDescription && data?.answer) {
                    const answerDescription = new RTCSessionDescription(data.answer);
                    peerConnection.setRemoteDescription(answerDescription);
                }
                if (data?.status === 'ended') endCallLocal();
            });

            peerConnection.ontrack = event => {
                document.getElementById('remoteAudio').srcObject = event.streams[0];
            };

            callDoc.collection('calleeCandidates').onSnapshot(snapshot => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') {
                        const candidate = new RTCIceCandidate(change.doc.data());
                        peerConnection.addIceCandidate(candidate);
                    }
                });
            });
        }

        // Auf eingehende Anrufe hören
        function listenForCalls(myEmail) {
            db.collection('calls').where('to', '==', myEmail).where('status', '==', 'ringing')
                .onSnapshot(snapshot => {
                    const list = document.getElementById('incomingCallsList');
                    list.innerHTML = "";
                    snapshot.forEach(doc => {
                        const callData = doc.data();
                        const div = document.createElement('div');
                        div.className = 'call-item';
                        div.innerHTML = `
                            <span>${callData.from}</span>
                            <div>
                                <button class="btn-call" onclick="answerCall('${doc.id}', '${callData.from}')">✔</button>
                                <button class="btn-reject" onclick="rejectCall('${doc.id}')">✖</button>
                            </div>
                        `;
                        list.appendChild(div);
                    });
                });
        }

        async function answerCall(docId, fromEmail) {
            currentCallDocId = docId;
            await setupMedia();
            showScreen('callScreen');
            document.getElementById('remoteUserEmail').innerText = fromEmail;
            document.getElementById('callStatus').innerText = "Verbunden";

            const callDoc = db.collection('calls').doc(docId);
            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = event => {
                event.candidate && callDoc.collection('calleeCandidates').add(event.candidate.toJSON());
            };

            peerConnection.ontrack = event => {
                document.getElementById('remoteAudio').srcObject = event.streams[0];
            };

            const callData = (await callDoc.get()).data();
            const offerDescription = callData.offer || callData; // Je nach Struktur
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offerDescription));

            const answerDescription = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answerDescription);

            const answer = {
                type: answerDescription.type,
                sdp: answerDescription.sdp,
            };

            await callDoc.update({ answer, status: 'connected' });

            callDoc.collection('callerCandidates').onSnapshot(snapshot => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') {
                        peerConnection.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                    }
                });
            });

            callDoc.onSnapshot(snapshot => {
                if (snapshot.data()?.status === 'ended') endCallLocal();
            });
        }

        async function rejectCall(docId) {
            await db.collection('calls').doc(docId).update({ status: 'ended' });
        }

        async function endCall() {
            if (currentCallDocId) {
                await db.collection('calls').doc(currentCallDocId).update({ status: 'ended' });
            }
            endCallLocal();
        }

        function endCallLocal() {
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            if (peerConnection) peerConnection.close();
            showScreen('mainScreen');
            currentCallDocId = null;
        }

        function showScreen(id) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('callScreen').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
