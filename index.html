<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyphone - VoIP</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg: #0a192f;
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #64ffda;
            --text: #e6f1ff;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: var(--bg);
            border-radius: 12px;
            margin-top: 10px;
        }

        .call-btn {
            background: #4caf50;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
        }

        .hangup-btn {
            background: #ff4d4d;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 24px;
        }

        .call-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0;
        }

        .hidden { display: none !important; }
        
        #remoteAudio, #localAudio { display: none; }
    </style>
</head>
<body>

    <div id="loginScreen" class="card">
        <h1 style="color: var(--accent)">Skyphone</h1>
        <p style="opacity: 0.6">Bitte anmelden</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Passwort">
        <button class="btn-main" onclick="handleAuth('login')">Login</button>
        <button class="btn-main" onclick="handleAuth('register')" style="background: transparent; color: var(--accent); border: 1px solid var(--accent);">Registrieren</button>
        <button class="btn-main" onclick="googleLogin()" style="background: #ea4335; color: white; margin-top: 20px;">Google Login</button>
    </div>

    <div id="mainScreen" class="card hidden">
        <h2 style="margin-top:0">Skyphone</h2>
        <p id="myEmail" style="font-size: 0.8rem; color: var(--accent)"></p>
        
        <div style="text-align: left;">
            <p style="font-weight: bold; margin-bottom: 5px;">Aktuelle Anrufe</p>
            <div id="incomingCallsList">
                <p style="font-size: 0.8rem; opacity: 0.5;">Keine aktiven Anrufe...</p>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <p style="font-weight: bold; margin-bottom: 5px; text-align: left;">Jemanden anrufen</p>
            <div style="display: flex; gap: 10px;">
                <input type="email" id="targetEmail" placeholder="partner@email.de" style="margin:0">
                <button class="call-btn" onclick="startCall()">📞</button>
            </div>
        </div>
        
        <button onclick="auth.signOut()" style="background:none; color:grey; margin-top:30px; border:none;">Abmelden</button>
    </div>

    <div id="callScreen" class="card hidden" style="background: var(--bg);">
        <h3 id="callStatusText">Verbinde...</h3>
        <div id="remoteName" style="font-size: 1.2rem; margin: 20px 0;">email@test.de</div>
        <div style="height: 100px; width: 100px; background: var(--accent); border-radius: 50%; margin: 30px auto; display: flex; align-items: center; justify-content: center; color: var(--bg); font-size: 40px;">👤</div>
        <button class="hangup-btn" onclick="endCall()">📞</button>
        <audio id="remoteAudio" autoplay></audio>
        <audio id="localAudio" autoplay muted></audio>
    </div>

    <script>
        // FIREBASE CONFIG - HIER DEINE DATEN EINTRAGEN
        const firebaseConfig = {
            apiKey: "AIzaSyCFqqgdh4JuPSQW09mDMAUktpeNW8jbGB4", authDomain: "skyphone-ad634.firebaseapp.com", projectId: "skyphone-ad634", storageBucket: "skyphone-ad634.firebasestorage.app", messagingSenderId: "393614313303", appId: "1:393614313303:web:8c7cccc3a5036d24752012" };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let localStream = null;
        let peerConnection = null;
        let currentCallId = null;

        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        // --- AUTH ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('myEmail').innerText = user.email;
                showScreen('mainScreen');
                // Nutzer in DB registrieren, damit er gefunden werden kann
                db.collection('users').doc(user.email).set({ status: 'online' }, { merge: true });
                listenForIncomingCalls(user.email);
            } else {
                showScreen('loginScreen');
            }
        });

        async function handleAuth(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return alert("Bitte Daten eingeben");
            try {
                if(type === 'login') await auth.signInWithEmailAndPassword(e, p);
                else await auth.createUserWithEmailAndPassword(e, p);
            } catch(err) { alert(err.message); }
        }

        async function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await auth.signInWithPopup(provider); } catch(err) { alert(err.message); }
        }

        // --- CALL LOGIC ---
        async function startCall() {
            const target = document.getElementById('targetEmail').value;
            if (!target || target === auth.currentUser.email) return alert("Ungültige Email");

            // Prüfen ob Nutzer existiert
            const userDoc = await db.collection('users').doc(target).get();
            if (!userDoc.exists) return alert("Dieser Nutzer nutzt Skyphone nicht.");

            try {
                // Mikrofon Zugriff
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('localAudio').srcObject = localStream;
                
                showScreen('callScreen');
                document.getElementById('remoteName').innerText = target;

                // RTC Setup
                peerConnection = new RTCPeerConnection(servers);
                localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));

                const callDoc = db.collection('calls').doc();
                currentCallId = callDoc.id;

                peerConnection.onicecandidate = e => e.candidate && callDoc.collection('callerCandidates').add(e.candidate.toJSON());

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                await callDoc.set({ 
                    offer: { type: offer.type, sdp: offer.sdp },
                    from: auth.currentUser.email,
                    to: target,
                    status: 'ringing'
                });

                // Listener für Antwort
                callDoc.onSnapshot(snap => {
                    const data = snap.data();
                    if (!peerConnection.currentRemoteDescription && data?.answer) {
                        peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                        document.getElementById('callStatusText').innerText = "Im Gespräch";
                    }
                    if (data?.status === 'ended') stopAll();
                });

                peerConnection.ontrack = e => document.getElementById('remoteAudio').srcObject = e.streams[0];

                callDoc.collection('calleeCandidates').onSnapshot(snap => {
                    snap.docChanges().forEach(change => {
                        if (change.type === 'added') peerConnection.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                    });
                });

            } catch (err) {
                alert("Fehler beim Anruf: " + err.message);
                showScreen('mainScreen');
            }
        }

        function listenForIncomingCalls(myEmail) {
            db.collection('calls').where('to', '==', myEmail).where('status', '==', 'ringing')
                .onSnapshot(snap => {
                    const list = document.getElementById('incomingCallsList');
                    list.innerHTML = snap.empty ? '<p style="font-size:0.8rem; opacity:0.5;">Keine aktiven Anrufe...</p>' : '';
                    snap.forEach(doc => {
                        const data = doc.data();
                        const div = document.createElement('div');
                        div.className = 'call-item';
                        div.innerHTML = `
                            <span style="font-size:0.9rem">${data.from}</span>
                            <div>
                                <button onclick="answerCall('${doc.id}', '${data.from}')" style="background:#4caf50; color:white; border-radius:50%; width:35px; height:35px; margin-right:5px;">✔</button>
                                <button onclick="rejectCall('${doc.id}')" style="background:#ff4d4d; color:white; border-radius:50%; width:35px; height:35px;">✖</button>
                            </div>
                        `;
                        list.appendChild(div);
                    });
                });
        }

        async function answerCall(id, from) {
            currentCallId = id;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('localAudio').srcObject = localStream;
                showScreen('callScreen');
                document.getElementById('remoteName').innerText = from;
                document.getElementById('callStatusText').innerText = "Im Gespräch";

                peerConnection = new RTCPeerConnection(servers);
                localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));

                const callDoc = db.collection('calls').doc(id);
                const callData = (await callDoc.get()).data();

                peerConnection.onicecandidate = e => e.candidate && callDoc.collection('calleeCandidates').add(e.candidate.toJSON());
                peerConnection.ontrack = e => document.getElementById('remoteAudio').srcObject = e.streams[0];

                await peerConnection.setRemoteDescription(new RTCSessionDescription(callData.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                await callDoc.update({ answer: { type: answer.type, sdp: answer.sdp }, status: 'connected' });

                callDoc.collection('callerCandidates').onSnapshot(snap => {
                    snap.docChanges().forEach(change => {
                        if (change.type === 'added') peerConnection.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                    });
                });

                callDoc.onSnapshot(snap => { if(snap.data()?.status === 'ended') stopAll(); });

            } catch(err) { alert(err.message); }
        }

        async function rejectCall(id) {
            await db.collection('calls').doc(id).update({ status: 'ended' });
        }

        async function endCall() {
            if(currentCallId) await db.collection('calls').doc(currentCallId).update({ status: 'ended' });
            stopAll();
        }

        function stopAll() {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(peerConnection) peerConnection.close();
            showScreen('mainScreen');
            currentCallId = null;
        }

        function showScreen(id) {
            ['loginScreen', 'mainScreen', 'callScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
